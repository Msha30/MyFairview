<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Level Card</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f4f8;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 280px;
            height: 420px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 20px;
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #666;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .gauge-wrapper {
            position: relative;
            height: 300px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .scale {
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }

        .scale.right {
            left: auto;
            right: 10px;
        }

        .gauge {
            position: relative;
            width: 70px;
            height: 100%;
            background: #eee;
            border-radius: 40px;
            overflow: hidden;
        }

        .fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65%;
            /* change water level here */
            background: linear-gradient(to top, #6a00ff, #00bcd4);
            transition: height 0.3s ease;
        }

        .value-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">🌡 WATER LEVEL</div>

        <div class="gauge-wrapper">

            <div class="scale">
                <div>100</div>
                <div>80</div>
                <div>60</div>
                <div>40</div>
                <div>20</div>
                <div>0</div>
            </div>

            <div class="gauge">
                <div class="fill"></div>
            </div>

            <div class="scale right">
                <div>100</div>
                <div>80</div>
                <div>60</div>
                <div>40</div>
                <div>20</div>
                <div>0</div>
            </div>

            <div class="value-box">65%</div>

        </div>
    </div>

</body>

</html>
