<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Styles/Fonts.css">
    <link rel="stylesheet" href="Styles/Variables.css">
    <link rel="stylesheet" href="CSS/Components.css">
    <link rel="icon" type="image/png" href="Images/Logo.png">
    <style>
        /* --------------------------------------GCO ADMIN-------------------------------------- */


        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("Images/Logo_BG.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        input[type="password"]::-webkit-credentials-auto-fill-button,
        input[type="password"]::-webkit-textfield-decoration-container {
            display: none !important;
        }

        input[type="password"]::-ms-reveal {
            display: none !important;
        }

        .login {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            width: 400px;
            margin: auto;
            padding: var(--cardpadding);
            border-radius: var(--rad);
            background: white;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .logo {
            width: 130px;
            align-self: center;
        }

        .form {
            flex: 1;
        }

        .form-input.out {
            display: flex;
            width: 100%;
            padding: 0px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radsmall);
            outline: none;
        }

        .form-input.pass {
            width: 95%;
            padding: 10px;
            background: none;
            border: none;
            border-radius: var(--radsmall);
            font-size: var(--textreg);
            font-family: 'Inter', sans-serif;
            color: var(--grey);
            outline: none;
        }

        .form-input.out:focus-within {
            border-color: var(--orange);
        }

        .form-label {
            font-size: var(--textreg);
        }

        .form-input {
            color: var(--black);
        }


        .toggle-password {
            align-self: center;
            padding-right: 10px;
            cursor: pointer;
        }

        .btn {
            height: 45px;
            width: 100%;
            background: var(--orangelight);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: var(--radsmall);
            font-size: var(--textbig);
            cursor: pointer;
            font-family: 'InterBold', sans-serif;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--orange);
            color: white
        }

        .forgot {
            margin-top: 15px;
            margin-bottom: 10px;
            text-align: center;
        }

        .forgot a {
            text-decoration: none;
            color: var(--grey);
            font-size: 14px;
            position: relative;
        }

        .forgot a:hover {
            color: var(--green);
            font-family: 'InterSemiBold', sans-serif;
        }

        .header-with-back {
            display: flex;
            align-items: center;
        }

        h3 {
            color: var(--green);
            font-family: 'InterBlack', sans-serif;
            margin-top: 3px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--green);
            font-family: 'InterBold', sans-serif;
            font-size: 25px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
        }

        .back-btn:hover {
            color: var(--black);
        }

        .hidden {
            display: none !important;
        }

        .toggle-password {
            align-self: center;
            padding-right: 10px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>

<body>
    <!-- ================= SIGN IN ================= -->
    <div id="ITLogIn" class="login">
        <img src="Images/Logo.png" class="logo">
        <form class="form" onsubmit="handleLogin(event)">
            <div class="form-row title">
                <label class="form-label">ID Number</label>
                <input class="form-input" type="text" required>
            </div>
            <div class="form-row title">
                <label class="form-label">Password</label>
                <div class="form-input out">
                    <input class="form-input pass" id="loginPassword" type="password" oninput="toggleEyeVisibility()"
                        required>
                    <div class="toggle-password" onclick="togglePassword('loginPassword')">
                        <svg id="loginEye" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            fill="#888" viewBox="0 0 24 24" style="transform: translateY(3px);">
                            <path
                                d="M12 5c-7.633 0-12 7-12 7s4.367 7 12 7 12-7 12-7-4.367-7-12-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
                            <circle cx="12" cy="12" r="2.5" />
                        </svg>
                        <svg id="loginEyeClosed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#888"
                            viewBox="0 0 24 24" style="transform: translateY(3px);">
                            <path
                                d="M12 5c-7.633 0-12 7-12 7s4.367 7 12 7 12-7 12-7-4.367-7-12-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
                            <circle cx="12" cy="12" r="2.5" />
                            <path d="M3 3L21 21" stroke="#888" stroke-width="2" stroke-linecap="round" fill="none" />
                        </svg>
                    </div>
                </div>
            </div>
            <button class="btn">Login</button>
            <div class="forgot">
                <a href="#" onclick="showResetPassword()">Forgot Password?</a>
            </div>
        </form>
    </div>

    <!-- ================= RESET PASSWORD ================= -->
    <div id="ITResetPassword" class="login hidden">
        <div class="form">
            <div class="header-with-back">
                <button class="back-btn" onclick="backToSignIn()">&lt;</button>
                <h3>Reset Password</h3>
            </div>

            <form onsubmit="return sendResetEmail(event)">
                <div class="form-row title">
                    <label class="form-label">Email</label>
                    <input class="form-input" id="resetEmail" type="email required">
                </div>

                <button type="submit" class="btn">Send Reset Email</button>

                <div class="forgot">
                    <a href="#" onclick="resendEmail()">Resend Email</a>
                </div>
            </form>
        </div>
    </div>


    <!-- ================= JS ================= -->
    <script>
        function handleLogin(event) {
            event.preventDefault();

            // optional: validate credentials here first

            sessionStorage.setItem("fromLogin", "true");

            window.location.href = "MainLayout.html";
        }

        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);

            const openEye = document.getElementById("loginEye");
            const closedEye = document.getElementById("loginEyeClosed");

            if (passwordInput.type === "password") {
                // Show password
                passwordInput.type = "text";

                openEye.classList.remove("hidden");
                closedEye.classList.add("hidden");
            } else {
                // Hide password
                passwordInput.type = "password";

                closedEye.classList.remove("hidden");
                openEye.classList.add("hidden");
            }
        }

        function toggleEyeVisibility() {
            const passwordInput = document.getElementById("loginPassword");
            const toggleBtn = document.querySelector(".toggle-password");

            if (passwordInput.value.trim() !== "") {
                toggleBtn.style.display = "block";
            } else {
                toggleBtn.style.display = "none";
                passwordInput.type = "password";
                document.getElementById("loginEye").classList.remove("hidden");
                document.getElementById("loginEyeClosed").classList.add("hidden");
            }
        }

        function showResetPassword() {
            document.getElementById('ITLogIn').classList.add('hidden');
            document.getElementById('ITResetPassword').classList.remove('hidden');
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetEmail').focus();
        }

        function showLogin() {
            document.getElementById("ITResetPassword").classList.add("hidden");
            document.getElementById("ITLogIn").classList.remove("hidden");
        }

        function backToSignIn() {
            document.getElementById('ITResetPassword').classList.add('hidden');

            document.getElementById('ITLogIn').classList.remove('hidden');
        }

        function sendResetEmail(event) {
            event.preventDefault();
            const email = document.getElementById('resetEmail').value;
            alert('A reset password link has been sent to ' + email);
            return false;
        }

        function resendEmail() {
            const email = document.getElementById('resetEmail').value;
            if (email) {
                alert('Reset email has been resent to ' + email);
            } else {
                alert('Please enter your email address first.');
            }
        }
    </script>
</body>

</html>
