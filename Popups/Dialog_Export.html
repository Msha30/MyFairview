<div id="dialogExport" class="modal-overlay">
    <div class="contentadd">
        <div class="diatitle mid">Export {Type}</div>

            <label class="form-label dia1">This will generate and download a CSV file containing the available {Type} data.</label>

        <div class="buttons dia">
            <button class="button delete">Cancel</button>
            <button class="button confirm">Export</button>
        </div>
    </div>
</div>
