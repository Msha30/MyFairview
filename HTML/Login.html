<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFairview — Sign In</title>
  <link rel="stylesheet" href="../Layout.css" />
</head>
<body>
  <div class="loginPageBg">
    <div class="loginCard">
      <h1 class="loginTitle">Sign In</h1>
      <div class="loginFieldGroup">
        <div class="loginInputWrap">
          <input id="loginInputEmail" class="loginInput" type="email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="loginInputWrap">
          <input id="loginInputPassword" class="loginInput" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="btnLoginTogglePassword" class="loginPasswordToggleBtn" type="button">👁</button>
        </div>
      </div>
      <button id="btnLoginSubmit" class="btnLoginSubmit" type="button">Log In</button>
      <a class="loginForgotLink" id="btnLoginGoForgot">Forgot Password</a>
      <p class="loginSwitchText">Don't have an account? <a class="loginSwitchLink" id="btnLoginGoSignup">Sign up</a></p>
    </div>
  </div>
  <script>
    document.getElementById('btnLoginTogglePassword').addEventListener('click', function () {
      var input = document.getElementById('loginInputPassword');
      var hidden = input.type === 'password';
      input.type = hidden ? 'text' : 'password';
      this.textContent = hidden ? '🙈' : '👁';
    });
    document.getElementById('btnLoginSubmit').addEventListener('click', function () {
      window.location.href = 'MainLayout.html';
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('btnLoginSubmit').click();
    });
    document.getElementById('btnLoginGoForgot').addEventListener('click', function () {
      window.location.href = 'ForgotPassword.html';
    });
    document.getElementById('btnLoginGoSignup').addEventListener('click', function () {
      window.location.href = 'Signup.html';
    });
  </script>
</body>
</html>
