<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFairview — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Layout.css" />
</head>
<body>

  <div class="loginPageBg">
    <div class="loginCard">

      <h1 class="loginTitle">Reset Password</h1>

      <p style="color:var(--colorTextMid); font-size:var(--fontSizeMD); margin-bottom:var(--spacingXL); line-height:1.6;">
        Enter your email address and we'll send you a link to reset your password.
      </p>

      <div class="loginFieldGroup">
        <div class="loginInputWrap">
          <input id="forgotInputEmail" class="loginInput" type="email" placeholder="Email" />
        </div>
      </div>

      <button id="btnForgotSubmit" class="btnLoginSubmit" type="button">Send Reset Link</button>

      <p class="loginSwitchText">
        Remembered your password?
        <a class="loginSwitchLink" id="forgotGoLogin">Sign in</a>
      </p>

    </div>
  </div>

  <!-- Button navigation JS -->
  <script>
    // Send Reset Link → back to Login
    document.getElementById('btnForgotSubmit').addEventListener('click', function () {
      window.location.href = 'Login.html';
    });

    // Go back to Login
    document.getElementById('forgotGoLogin').addEventListener('click', function () {
      window.location.href = 'Login.html';
    });
  </script>

</body>
</html>
