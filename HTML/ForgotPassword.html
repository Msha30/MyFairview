<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFairview — Forgot Password</title>
  <link rel="stylesheet" href="../Layout.css" />
</head>
<body>
  <div class="loginPageBg">
    <div class="loginCard">
      <h1 class="loginTitle">Reset Password</h1>
      <p style="color:var(--colorTextLight);font-size:var(--fontSizeRegular);margin-bottom:var(--spacingM);line-height:1.6;">
        Enter your email and we'll send you a reset link.
      </p>
      <div class="loginFieldGroup">
        <div class="loginInputWrap"><input id="forgotInputEmail" class="loginInput" type="email" placeholder="Email" /></div>
      </div>
      <button id="btnForgotSubmit" class="btnLoginSubmit" type="button">Send Reset Link</button>
      <p class="loginSwitchText">Remembered it? <a class="loginSwitchLink" id="btnForgotGoLogin">Sign in</a></p>
    </div>
  </div>
  <script>
    document.getElementById('btnForgotSubmit').addEventListener('click', function () {
      window.location.href = 'Login.html';
    });
    document.getElementById('btnForgotGoLogin').addEventListener('click', function () {
      window.location.href = 'Login.html';
    });
  </script>
</body>
</html>
