<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MyFairview</title>
        <link rel="stylesheet" href="Styles/Fonts.css">
        <link rel="stylesheet" href="Styles/Variables.css">
        <link rel="icon" type="image/png" href="Images/Logo.png">
        <style>

            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family: 'Inter', sans-serif;
                letter-spacing: 0.02em; 
            }

            body{
                letter-spacing: 1px;
                display:flex;
                height:100vh;
                overflow:hidden;
            }

            .body {
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            .content {
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            /* =======================
            ALERT
            ======================= */

            .alert {
                background: var(--orange);
                padding: 10px 28px;
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: var(--textreg);
                color: white;
                font-weight: 500;
                cursor: default;
                -webkit-user-select: none;
                -ms-user-select: none;
                -webkit-user-drag: none;
            }
                
                .alert strong { font-weight: 700; }
                .alert-pill {
                background: #ffffff47;
                border: 1px solid #ffffff5e;
                padding: 3px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.5px;
            }

            /* =======================
            SIDEBAR
            ======================= */
            .sidebar{
                width:250px;
                background:white;
                border-right:1px solid var(--border);
                display:flex;
                flex-direction:column;
            }

            .logo{
                margin: 30px 30px 0px 30px;
                font-size:32px;
                font-family: 'InterExtraBold', sans-serif;
                background: var(--grad);
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                -webkit-text-fill-color: transparent;
                user-select: none;
            }

            .menu{
                flex:1;
                padding:20px;
            }

            .menu-title{
                font-size:10px;
                color: var(--greylight);
                margin:20px 10px 5px;
                text-transform:uppercase;
                user-select: none;
                -webkit-user-select: none;
                -ms-user-select: none;
                -webkit-user-drag: none;
            }

            .menu-icon {
                width: 18px;
                height: 18px;
                flex-shrink: 0;
                margin-bottom: 1px;
                opacity: 0.5;
            }

            .menu-item.active .menu-icon{
                filter: invert(100%);
                opacity: 100;
            }

            .menu-item{
                color: var(--grey);
                display: flex;
                align-items: center;  
                gap: 10px;
                font-size: var(--textreg);
                padding: 12px;
                border-radius: var(--radbox);
                cursor: pointer;
                -webkit-user-select: none;
                -ms-user-select: none;
                -webkit-user-drag: none;
                transition: .2s;
            }

            .menu-item:hover{
                background: var(--bg);
            }

            .menu-item.active{
                background:var(--orange);
                color:white;
                font-family: 'InterSemiBold', sans-serif;
            }

            .user-section{
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 10px;
                margin:20px;
                border-radius: var(--radbox);
                cursor: pointer;
                -webkit-user-select: none;
                -ms-user-select: none;
                -webkit-user-drag: none;
                margin-bottom: 15px;
            }

            .user-section:hover { background: var(--bg); }

            .user-avatar {
                width: 32px; height: 32px;
                border-radius: var(--radbox);
                background: var(--gradorange);
                display: flex; align-items: center; justify-content: center;
                font-size: 12px; font-weight: 700; color: white;
                flex-shrink: 0;
            }

            .user-info{
                align-items: center;  
                font-size: 13px;
                cursor: pointer;
                transition: .2s;
            }

            .user-info{
                font-size: var(--textreg);
            }

            .user-info span{
                font-size: var(--textsmall);
                color: var(--grey);
            }



            /* =======================
            CONTENT
            ======================= */
            .content{
                flex:1;
                display:flex;
                flex-direction:column;
                overflow:hidden;
                background: var(--bg);
            }

            #contentFrame{
                width:100%;
                height:100%;
                border:none;
            }

        </style>
    </head>
    <body>
    <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">MyFairview</div>
            <div class="menu">
                <div class="menu-title">Main</div>
                <div class="menu-item active"
                    onclick="loadPage(this,'MainPages/Overview.html')">
                    <img src="Icons\nav_overview.svg" class="menu-icon" alt=""/>
                    Overview
                </div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/Announcement.html')">
                    <img src="Icons\nav_announcement.svg" class="menu-icon" alt=""/>
                    Announcement
                </div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/Citizens.html')">
                    <img src="Icons\nav_citizens.svg" class="menu-icon" alt=""/>
                    Citizens
                </div>

                <div class="menu-title">Operations</div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/Vehicles.html')">
                    <img src="Icons\nav_vehicles.svg" class="menu-icon" alt=""/>
                    Emergency Vehicles
                </div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/Reports.html')">
                    <img src="Icons\nav_reports.svg" class="menu-icon" alt=""/>
                    Community Reports
                </div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/WaterLevel.html')">
                    <img src="Icons\nav_water.svg" class="menu-icon" alt=""/>
                    Water Level
                </div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/EvacuationPlan.html')">
                    <img src="Icons\nav_evacuation.svg" class="menu-icon" alt=""/>
                    Evacuation Plan
                </div>

                <div class="menu-title">Admin</div>
                <div class="menu-item"
                    onclick="loadPage(this,'MainPages/Access.html')">
                    <img src="Icons\nav_access.svg" class="menu-icon" alt=""/>
                    Access Management
                </div>
            </div>
            <div class="user-section">
                <div class="user-avatar">LI</div>
                <div class="user-info">
                    <strong>Lorem Ipsum</strong><br>
                    <span>Administrator</span>
                </div>
            </div>
        </div>
        <!-- Main Content -->
        <div class="body">
            <div class="alert">
                <span class="alert-pill">⚠ ALERT</span>
                <strong>Water Level Advisory:</strong> 
                Barangay Fairview Bridge is at 0.0ft — monitor closely.
                <span style="margin-left:auto;font-size:12px;opacity:0.8">Jun 8, 2026 · 10:42 AM</span>
            </div>
            <div class="content">
                <iframe
                    id="contentFrame"
                    src="MainPages/Overview.html">
                </iframe>
            </div>
        </div>
        <script>
            function loadPage(element, page){
                document.querySelectorAll('.menu-item')
                    .forEach(item => item.classList.remove('active'));
                element.classList.add('active');
                document.getElementById('contentFrame').src = page;
            }
        </script>
    </body>
</html>
